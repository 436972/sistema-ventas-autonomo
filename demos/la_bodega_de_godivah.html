<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bodega de Godivah | Restaurante en Ponferrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B4513;
            --primary-dark: #6B3410;
            --secondary: #D4A574;
            --accent: #C7956D;
            --dark: #2C1810;
            --light: #FFF8F0;
            --text: #3E2723;
            --text-light: #6D4C41;
            --white: #FFFFFF;
            --shadow: rgba(139, 69, 19, 0.08);
            --shadow-strong: rgba(139, 69, 19, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            background: var(--white);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            line-height: 1.2;
            color: var(--dark);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section {
            padding: 100px 0;
        }

        @media (max-width: 768px) {
            .section {
                padding: 60px 0;
            }
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary-dark) 100%);
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=3000&auto=format&fit=crop') center/cover;
            opacity: 0.3;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            color: var(--white);
            padding: 40px 0;
        }

        .hero h1 {
            font-size: clamp(48px, 8vw, 86px);
            margin-bottom: 24px;
            color: var(--white);
            font-weight: 600;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: clamp(20px, 3vw, 28px);
            margin-bottom: 16px;
            color: var(--secondary);
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
        }

        .hero-description {
            font-size: clamp(16px, 2vw, 20px);
            margin-bottom: 40px;
            opacity: 0.95;
            line-height: 1.7;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 42px;
            background: var(--secondary);
            color: var(--dark);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(212, 165, 116, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(212, 165, 116, 0.4);
            background: var(--accent);
        }

        /* Trust Section */
        .trust-section {
            background: var(--light);
            padding: 60px 0;
        }

        .trust-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .trust-item {
            padding: 20px;
        }

        .trust-value {
            font-size: 48px;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Cormorant Garamond', serif;
            margin-bottom: 8px;
        }

        .trust-label {
            font-size: 16px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .stars {
            color: #FFB800;
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* Section Title */
        .section-title {
            text-align: center;
            margin-bottom: 70px;
        }

        .section-title h2 {
            font-size: clamp(36px, 5vw, 56px);
            margin-bottom: 16px;
            color: var(--dark);
        }

        .section-title p {
            font-size: 18px;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Services Section */
        .services-section {
            background: var(--white);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .service-card {
            background: var(--white);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 4px 30px var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid rgba(139, 69, 19, 0.08);
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 50px var(--shadow-strong);
        }

        .service-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 24px;
        }

        .service-card h3 {
            font-size: 26px;
            margin-bottom: 16px;
            color: var(--dark);
        }

        .service-card p {
            color: var(--text-light);
            line-height: 1.7;
            font-size: 16px;
        }

        /* Why Choose Us */
        .why-section {
            background: var(--light);
        }

        .why-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .why-card {
            text-align: center;
            padding: 24px;
        }

        .why-icon {
            width: 80px;
            height: 80px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px var(--shadow);
        }

        .why-card h3 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .why-card p {
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Gallery Section */
        .gallery-section {
            background: var(--white);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            height: 350px;
            box-shadow: 0 4px 30px var(--shadow);
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 50px var(--shadow-strong);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Reviews Section */
        .reviews-section {
            background: var(--dark);
            color: var(--white);
        }

        .reviews-section .section-title h2,
        .reviews-section .section-title p {
            color: var(--white);
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            margin-top: 60px;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .review-stars {
            color: #FFB800;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .review-text {
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 20px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.9);
        }

        .review-author {
            font-weight: 600;
            color: var(--secondary);
        }

        /* Contact Section */
        .contact-section {
            background: var(--light);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }

        @media (max-width: 968px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }

        .contact-info {
            background: var(--white);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 4px 30px var(--shadow);
        }

        .contact-info h3 {
            font-size: 32px;
            margin-bottom: 32px;
        }

        .contact-item {
            display: flex;
            align-items: start;
            margin-bottom: 28px;
            gap: 20px;
        }

        .contact-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .contact-details h4 {
            font-size: 18px;
            margin-bottom: 4px;
            color: var(--dark);
        }

        .contact-details p {
            color: var(--text-light);
            font-size: 16px;
        }

        .contact-details a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-details a:hover {
            color: var(--primary-dark);
        }

        .map-container {
            border-radius: 24px;
            overflow: hidden;
            height: 500px;
            box-shadow: 0 4px 30px var(--shadow);
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .whatsapp-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(37, 211, 102, 0.4);
            background: #20BA5A;
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: rgba(255, 255, 255, 0.8);
            padding: 60px 0 30px;
        }

        .footer-content {
            text-align: center;
            margin-bottom: 40px;
        }

        .footer-content h3 {
            font-size: 32px;
            color: var(--white);
            margin-bottom: 16px;
        }

        .footer-content p {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            text-align: center;
            font-size: 14px;
        }

        .footer-bottom a {
            color: var(--secondary);
            text-decoration: none;
        }

        .footer-bottom a:hover {
            color: var(--accent);
        }

        .disclaimer {
            margin-top: 16px;
            font-size: 13px;
            opacity: 0.6;
            font-style: italic;
        }

        /* Google Rating Display */
        .google-rating {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--white);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 20px var(--shadow);
            margin-top: 24px;
        }

        .google-rating img {
            width: 24px;
            height: 24px;
