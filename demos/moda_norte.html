<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moda Norte - Tienda de Ropa en Ponferrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2D2D2D;
            --secondary: #C9A882;
            --accent: #8B7355;
            --light: #F8F6F3;
            --white: #FFFFFF;
            --text: #333333;
            --text-light: #666666;
            --gradient: linear-gradient(135deg, #2D2D2D 0%, #4A4A4A 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
            background: var(--white);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: var(--primary);
            overflow: hidden;
        }

        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(45, 45, 45, 0.95) 0%, rgba(45, 45, 45, 0.7) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            color: var(--white);
            padding: 120px 0 80px;
            width: 100%;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(201, 168, 130, 0.15);
            color: var(--secondary);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            border: 1px solid rgba(201, 168, 130, 0.3);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(48px, 7vw, 82px);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: clamp(18px, 3vw, 24px);
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            max-width: 600px;
            font-weight: 300;
        }

        .hero-cta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 36px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--secondary);
            color: var(--primary);
        }

        .btn-primary:hover {
            background: #D4B491;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(201, 168, 130, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--white);
        }

        .trust-section {
            background: var(--white);
            padding: 60px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .trust-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .trust-item {
            padding: 20px;
        }

        .trust-number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 8px;
            display: block;
        }

        .trust-label {
            color: var(--text-light);
            font-size: 15px;
            font-weight: 500;
        }

        .stars {
            color: #FFA500;
            font-size: 24px;
            margin-bottom: 8px;
        }

        section {
            padding: 100px 0;
        }

        .section-header {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 60px;
        }

        .section-badge {
            display: inline-block;
            background: rgba(201, 168, 130, 0.1);
            color: var(--accent);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 5vw, 52px);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .section-description {
            font-size: 18px;
            color: var(--text-light);
            line-height: 1.8;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
        }

        .service-card {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
            position: relative;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            border-color: var(--secondary);
        }

        .service-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 24px;
        }

        .service-card h3 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .service-card p {
            color: var(--text-light);
            line-height: 1.7;
            font-size: 15px;
        }

        .why-choose {
            background: var(--light);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            margin-top: 60px;
        }

        .feature-item {
            text-align: center;
            padding: 32px 24px;
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .feature-item h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .feature-item p {
            color: var(--text-light);
            font-size: 15px;
            line-height: 1.7;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            padding-bottom: 75%;
        }

        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .reviews-section {
            background: var(--light);
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            margin-top: 60px;
        }

        .review-card {
            background: var(--white);
            padding: 36px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        .review-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        }

        .review-stars {
            color: #FFA500;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .review-text {
            color: var(--text);
            line-height: 1.8;
            margin-bottom: 20px;
            font-size: 15px;
            font-style: italic;
        }

        .review-author {
            font-weight: 600;
            color: var(--primary);
            font-size: 16px;
        }

        .review-date {
            color: var(--text-light);
            font-size: 13px;
        }

        .contact-section {
            background: var(--primary);
            color: var(--white);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }

        .contact-info h2 {
            color: var(--white);
            margin-bottom: 32px;
        }

        .contact-item {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
            align-items: flex-start;
        }

        .contact-icon {
            width: 56px;
            height: 56px;
            background: rgba(201, 168, 130, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .contact-details h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--secondary);
        }

        .contact-details p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
        }

        .contact-details a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-details a:hover {
            color: var(--secondary);
        }

        .map-container {
            border-radius: 20px;
            overflow: hidden;
            height: 450px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            background: #20BA5A;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(37, 211, 102, 0.3);
        }

        footer {
            background: #1A1A1A;
            color: rgba(255, 255, 255, 0.6);
            padding: 48px 0 32px;
            text-align: center;
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .footer-credit {
            font-size: 15px;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .footer-credit strong {
            color: var(--secondary);
        }

        .footer-disclaimer {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.6;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

                grid-template-columns:
